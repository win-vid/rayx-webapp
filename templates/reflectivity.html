{% extends "base.html" %}

{% block main %}
        <div class = "FormContainer">
            <h2>Reflectivity</h2>
            <form action="{{url_for('handle_post_reflectivity')}}" method="POST" enctype="multipart/form-data">
                <input type="file" id="rmlFile" name="rmlFile" accept=".rml"> 
                <label for="min_e">From eV:</label>
                <input type="number" id="min_e" value="{{min_e or 30}}" name="min_e" min="0" max="1000">    <!-- TODO: Cant be bigger than max_e -->
                <label for="max_e">To eV:</label>
                <input type="number" id="max_e" value="{{max_e or 100}}"name="max_e" min="0" max="1000">     <!--TODO: Change to 1000-->
                <label for="degree">Degree:</label>
                <input type="number" id="degree" value="{{degree or 10}}" name="degree" min="0" max="360">
                <label for="material">Material:</label>
                <select id="material" name="material">

                <label for="density">Density:</label>
                <input type="number" id="density" value="{{density or 1}}" name="density" min="0" max="100">
                <label for="roughness">Roughness:</label>
                <input type="number" id="roughness" value="{{roughness or 1}}" name="roughness" min="0" max="100">
                <button type="submit">Send</button>
            </form>

        {% block received %}
        {% endblock %}
        <hr>
        <h2 style=
            "margin-top: 3rem;"
        >{{ RMLFileName }}</h2>
        <div class="PlotsContainer">
            {{ plot_data | safe }}
